name: Performance Budget

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bundle-size:
    name: Bundle size (size-limit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build with analyzer
        run: ANALYZE=true npm run build
        env:
          # Keep ANALYZE on so .next/analyze/ is written for inspection.
          ANALYZE: 'true'

      - name: Upload analyzer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analyzer-reports
          path: .next/analyze/
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce per-entry size-limit budgets
        run: npx size-limit

  lighthouse-ci:
    name: Lighthouse CI (LCP / CLS / FID on 3G)
    runs-on: ubuntu-latest
    # Non-blocking until Cloudflare Pages staging URL exists. The current
    # localhost-based run hits ERRORED_DOCUMENT_REQUEST on the locale-prefixed
    # paths because `npm start` isn't serving them the way production would.
    # Swap `collect.url` in `.lighthouserc.js` to the Pages preview and drop
    # this flag once that's live.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun --config=.lighthouserc.js
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
