name: Deploy (Cloudflare Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: Cloudflare Pages deploy
    runs-on: ubuntu-latest
    # Deploy is opt-in — set the repo variable DEPLOY_ENABLED=true to arm this
    # workflow. The gate keeps the Month 3 soft launch window under our control.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "::error::CLOUDFLARE_ACCOUNT_ID missing"; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::CLOUDFLARE_API_TOKEN missing"; exit 1; }

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run pages:build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: loftly-web
          directory: .vercel/output/static
          branch: ${{ github.ref_name }}

      - name: Smoke test
        run: |
          # Quick GET / against the deployed origin; fail fast if non-200.
          URL="${{ vars.DEPLOYED_URL || 'https://loftly-web.pages.dev' }}"
          code=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "GET $URL -> $code"
          [ "$code" = "200" ] || { echo "::error::smoke test failed ($code)"; exit 1; }
